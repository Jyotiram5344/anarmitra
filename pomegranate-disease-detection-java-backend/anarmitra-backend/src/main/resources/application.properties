spring.application.name=anarmitra-backend

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:anarmitra_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:MySuperSecureSecretKeyForJWTTokenGeneration123456}
jwt.expiration=${JWT_EXPIRATION:86400000}

ml.api.url=${ML_API_URL:http://localhost:8000}

# Logging configuration for debugging database & startup issues
logging.level.org.zaxxer.hikari=DEBUG
logging.level.org.springframework.datasource=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.SQL=DEBUG